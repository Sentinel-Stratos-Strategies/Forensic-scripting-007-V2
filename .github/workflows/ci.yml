name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then python -m pip install -r requirements.txt; fi

      - name: Python compile
        run: python -m py_compile scripts/*.py scripts/hydrate/*.py

      - name: Shell syntax
        run: bash -n atlas_submission_capture.sh recursive_macos_volume_verify.sh run_forensic_suite.sh scripts/*.sh tests/*.sh

      - name: Narrative packet fixture
        run: bash tests/test_narrative_claim_packet.sh

      - name: Recursive verifier fixture
        run: bash tests/test_recursive_macos_volume_verify.sh
